name: Mutual Fund Data Sync

on:
  schedule:
    # 6:30 PM IST is 13:00 UTC, Mon-Fri
    - cron: '30 13 * * 1-5'
  workflow_dispatch: # Allow manual trigger

jobs:
  sync_mf_data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests supabase python-dotenv pandas openpyxl lxml html5lib beautifulsoup4 pypdf

      - name: Run AMFI MF Sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python backend/scripts/sync_mf.py

      - name: Backfill MF NAV History
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          MF_HISTORY_SCHEME_LIMIT: "200"
        run: python backend/scripts/sync_mf_history.py

      - name: Sync MF Metadata
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python backend/scripts/sync_mf_metadata.py
