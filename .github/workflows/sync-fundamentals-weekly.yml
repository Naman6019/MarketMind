name: Sync Fundamentals Weekly

on:
  schedule:
    - cron: '0 2 * * 6'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run Jobs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          STOCK_DATA_PROVIDER: finedge
          FINEDGE_API_KEY: ${{ secrets.FINEDGE_API_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_KEY" ] || [ -z "$FINEDGE_API_KEY" ]; then
            echo "Error: Missing SUPABASE_URL, SUPABASE_KEY, or FINEDGE_API_KEY"
            exit 1
          fi
          python -m backend.app.jobs.sync_fundamentals
          python -m backend.app.jobs.calculate_ratios
