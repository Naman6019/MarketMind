name: Sync Stock Universe

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Debug env vars
        env:
          INDIANAPI_KEY: ${{ secrets.INDIAN_API_KEY }}
        run: |
          echo "STOCK_DATA_PROVIDER=indianapi (hardcoded)"
          if [ -z "$INDIANAPI_KEY" ]; then
            echo "ERROR: INDIAN_API_KEY secret is empty or not set!"
            exit 1
          else
            echo "INDIANAPI_KEY is set (length=${#INDIANAPI_KEY})"
          fi

      - name: Run Job
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          STOCK_DATA_PROVIDER: indianapi
          INDIANAPI_KEY: ${{ secrets.INDIAN_API_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_KEY" ]; then
            echo "Error: Missing SUPABASE_URL or SUPABASE_KEY"
            exit 1
          fi
          echo "STOCK_DATA_PROVIDER=$STOCK_DATA_PROVIDER"
          echo "INDIANAPI_KEY set=$([ -n "$INDIANAPI_KEY" ] && echo yes || echo no)"
          python -m backend.app.jobs.sync_stock_universe
