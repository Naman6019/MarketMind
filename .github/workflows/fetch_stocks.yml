name: EOD Stock Data Fetch

on:
  schedule:
    # Runs at 6:00 PM IST (12:30 UTC) on weekdays to ensure NSE Bhavcopy is published
    - cron: '30 12 * * 1-5'
  workflow_dispatch: # allows manual trigger from GitHub UI

jobs:
  fetch-nifty-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas supabase python-dotenv requests jugaad-data nsetools

      - name: Run EOD Fetcher
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          FUNDAMENTALS_PROVIDER: manual
          STOCK_UNIVERSE_INDEX: NIFTY500
          STOCK_INFO_ENRICH_LIMIT: "120"
          STOCK_YFINANCE_FALLBACK_LIMIT: "150"
        run: |
          python backend/scripts/sync_stock_universe.py
          python backend/scripts/run_fetch.py
          python backend/scripts/sync_fundamentals.py
          python backend/scripts/calculate_ratios.py
