name: Keep Render Alive

on:
  schedule:
    - cron: '*/14 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping MarketMind API
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            https://marketmind-hz03.onrender.com/health)
          echo "Health check status: $response"
          if [ "$response" != "200" ]; then
            echo "WARNING: API returned $response"
            exit 1
          fi
